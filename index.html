<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#13100d" />
    <title>Varath World</title>

    <!-- Google Fonts: Cinzel (headings) + EB Garamond (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <!-- The whole game renders into this canvas. -->
      <canvas id="game"></canvas>

      <!-- HUD overlays (skills, inventory, log, dialogue) are built by the
           client at runtime and layered on top of the canvas. -->
      <div id="hud"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
